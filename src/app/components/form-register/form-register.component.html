<section class="form-login">
  <h2 class="form-login-title">Create Account</h2>
  <form [formGroup]="form" class="form" (ngSubmit)="onSubmit()">
    <label class="form-login-field">
      <span class="form-field-label">Login</span>
      <input
        formControlName="login"
        class="form-login-input"
        type="text"
        placeholder="Enter your login"
      />
    </label>
    <label class="form-login-field">
      <span class="form-field-label">Email</span>
      <input
        formControlName="email"
        class="form-login-input"
        type="email"
        placeholder="Enter your email"
      />
    </label>
    <div formGroupName="passwords" class="form">
      <label class="form-login-field">
        <span class="form-field-label">Password</span>
        <input
          formControlName="password"
          class="form-login-input"
          type="text"
          placeholder="Enter your password"
        />
      </label>
      <label class="form-login-field">
        <span class="form-field-label">Confirm Password</span>
        <input
          formControlName="confirmPassword"
          class="form-login-input"
          type="text"
          placeholder="Repeat your password"
        />
      </label>
    </div>

    <label class="form-field-check-wrap">
      <input formControlName="acceptTerms" type="checkbox" class="form-field-check" />
      I agree to the Terms of Service and Privacy Policy
    </label>

    <button appButtonLogin>{{ btnText() }}</button>
  </form>

  <span class="form-login-signin"
    >Already have an account? <a routerLink="/login" class="form-signin-link">Sign in</a></span
  >
</section>

@if (isAlert()) {
  <app-alert (closed)="isAlert.set(false)" [alertText]="alertText()" />
}
